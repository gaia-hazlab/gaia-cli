name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true

      - name: Run tests
        run: pixi run test

      - name: Run typecheck
        run: pixi run typecheck

      - name: Run lint
        run: pixi run lint
